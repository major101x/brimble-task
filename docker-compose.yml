services:
  backend:
    build: ./backend
    volumes:
      - backend-data:/app/data
    networks:
      - app-network

  frontend:
    build: ./frontend
    networks:
      - app-network

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    networks:
      - app-network
    depends_on:
      - backend
      - frontend

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
